---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-azurelustre-node-sa
  namespace: kube-system
  labels:
    azure.workload.identity/use: "true"
  # To use workload identity, uncomment and set the client-id annotation:
  # annotations:
  #   azure.workload.identity/client-id: "<AZURE_CLIENT_ID>"
  #   azure.workload.identity/tenant-id: "<AZURE_TENANT_ID>"  # optional, if cross-tenant

---
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: csi-azurelustre-node-secret-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]

---
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: csi-azurelustre-node-secret-binding
subjects:
  - kind: ServiceAccount
    name: csi-azurelustre-node-sa
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: csi-azurelustre-node-secret-role
  apiGroup: rbac.authorization.k8s.io
